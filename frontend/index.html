<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .recording {
            animation: pulse-red 1.5s infinite;
        }

        .thinking {
            animation: pulse-blue 1.5s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        @keyframes pulse-blue {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        .bars-container {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 30px;
        }

        .bar {
            width: 4px;
            background: #60a5fa;
            border-radius: 4px;
            transition: height 0.05s ease;
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.85rem;
            max-width: 85%;
            line-height: 1.4;
            animation: slideUp 0.3s ease-out;
        }

        .bubble-user {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            align-self: flex-end;
            margin-left: auto;
            color: #94a3b8;
        }

        .bubble-ai {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            align-self: flex-start;
            color: #e2e8f0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-[#0f172a] text-white min-h-screen">
    <div class="container mx-auto max-w-6xl px-4 py-8 flex flex-col items-center justify-center min-h-screen">

        <div class="text-center mb-10">
            <h1
                class="text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 via-indigo-400 to-cyan-300 bg-clip-text text-transparent">
                Voice Agent</h1>
            <p id="security-warning" class="text-red-400 text-[10px] uppercase tracking-widest font-bold hidden">
                Insecure Context: HTTPS Required for Mic</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-8 w-full items-stretch h-[650px]">
            <div class="flex-1 flex flex-col gap-8">
                <div
                    class="bg-[#1e293b]/50 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden flex flex-col items-center justify-center flex-1">
                    <div id="ai-glow"
                        class="absolute -top-24 -right-24 w-64 h-64 bg-blue-500/10 blur-[100px] rounded-full transition-all duration-1000">
                    </div>

                    <div class="flex flex-col items-center space-y-10 relative z-10 w-full">
                        <div class="grid grid-cols-3 gap-4 w-full max-w-sm">
                            <div id="stage-stt"
                                class="p-3 rounded-2xl bg-slate-900/50 border border-white/5 flex flex-col items-center gap-1 opacity-30">
                                <span class="text-[8px] font-bold">STT</span>
                                <div class="w-1 h-1 rounded-full bg-blue-400 dot hidden"></div>
                            </div>
                            <div id="stage-llm"
                                class="p-3 rounded-2xl bg-slate-900/50 border border-white/5 flex flex-col items-center gap-1 opacity-30">
                                <span class="text-[8px] font-bold">LLM</span>
                                <div class="w-1 h-1 rounded-full bg-indigo-400 dot hidden"></div>
                            </div>
                            <div id="stage-tts"
                                class="p-3 rounded-2xl bg-slate-900/50 border border-white/5 flex flex-col items-center gap-1 opacity-30">
                                <span class="text-[8px] font-bold">TTS</span>
                                <div class="w-1 h-1 rounded-full bg-cyan-400 dot hidden"></div>
                            </div>
                        </div>

                        <div id="status-container"
                            class="relative w-48 h-48 rounded-full border-4 border-white/5 flex items-center justify-center transition-all duration-500">
                            <div id="visualizer" class="bars-container hidden scale-150">
                                <div class="bar h-2"></div>
                                <div class="bar h-8"></div>
                                <div class="bar h-4"></div>
                                <div class="bar h-12"></div>
                                <div class="bar h-6"></div>
                                <div class="bar h-10"></div>
                                <div class="bar h-3"></div>
                                <div class="bar h-9"></div>
                            </div>
                            <svg id="idle-icon" class="w-16 h-16 text-slate-500 opacity-50" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                                    d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z">
                                </path>
                            </svg>
                        </div>

                        <div class="text-center px-4">
                            <span id="state-label"
                                class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4 block">Tap
                                to setup mic</span>
                            <div id="recording-timer" class="text-sm font-mono text-red-500 mb-2 hidden">00:00</div>
                        </div>

                        <div class="flex items-center gap-6">
                            <div class="flex flex-col items-center gap-4">
                                <button id="mic-btn"
                                    class="w-24 h-24 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-full flex items-center justify-center shadow-2xl transition-all hover:scale-110 active:scale-95 group">
                                    <div id="rec-dot"
                                        class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full hidden border-2 border-white animate-pulse">
                                    </div>
                                    <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                                        <path
                                            d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                                    </svg>
                                </button>
                            </div>
                            <button id="stop-btn"
                                class="w-16 h-16 bg-slate-800 border border-white/10 rounded-full flex items-center justify-center hover:bg-slate-700 transition-all active:scale-90 group">
                                <svg class="w-6 h-6 text-slate-400 group-hover:text-red-400" fill="currentColor"
                                    viewBox="0 0 24 24">
                                    <path d="M6 6h12v12H6z" />
                                </svg>
                            </button>
                        </div>
                        <button id="simulate-btn"
                            class="text-[9px] uppercase tracking-widest text-slate-500 hover:text-blue-400 font-bold transition-colors">
                            Simulate AI Pipeline
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-96 flex flex-col h-full overflow-hidden">
                <div
                    class="bg-slate-900/40 border border-white/5 rounded-[2rem] flex-1 flex flex-col p-6 backdrop-blur-md overflow-hidden">
                    <div class="flex items-center justify-between mb-6 shrink-0">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Live Transcript</h2>
                        <button id="load-history-btn"
                            class="text-[8px] uppercase tracking-widest bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full hover:bg-blue-500/20 transition-all font-bold border border-blue-500/20">
                            Load History
                        </button>
                    </div>
                    <div id="history-container" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws, mediaRecorder, audioStream, isRecording = false;

        const micBtn = document.getElementById('mic-btn');
        const stateLabel = document.getElementById('state-label');
        const historyContainer = document.getElementById('history-container');

        // SECURITY CHECK: Provide immediate feedback if not on HTTPS/Localhost
        if (!window.isSecureContext) {
            document.getElementById('security-warning').classList.remove('hidden');
            stateLabel.innerText = "Mic blocked (Insecure Context)";
        }

        function addToHistory(text, role) {
            const div = document.createElement('div');
            div.className = `bubble ${role === 'user' ? 'bubble-user' : 'bubble-ai'}`;
            div.innerText = text;
            historyContainer.appendChild(div);
            historyContainer.scrollTop = historyContainer.scrollHeight;
        }

        const statusContainer = document.getElementById('status-container');
        const idleIcon = document.getElementById('idle-icon');
        const visualizer = document.getElementById('visualizer');
        const recDot = document.getElementById('rec-dot');
        const aiGlow = document.getElementById('ai-glow');
        const bars = document.querySelectorAll('.bar');

        function updatePipelineStages(activeStage) {
            const stages = { 'STT': 'stage-stt', 'LLM': 'stage-llm', 'TTS': 'stage-tts' };
            Object.keys(stages).forEach(key => {
                const el = document.getElementById(stages[key]);
                if (key === activeStage && activeStage !== 'IDLE') {
                    el.classList.remove('opacity-30');
                    el.classList.add('opacity-100', 'bg-blue-500/10', 'border-blue-500/30');
                    el.querySelector('.dot').classList.remove('hidden');
                } else {
                    el.classList.add('opacity-30');
                    el.classList.remove('opacity-100', 'bg-blue-500/10', 'border-blue-500/30');
                    el.querySelector('.dot').classList.add('hidden');
                }
            });
        }

        function setUIState(state) {
            statusContainer.classList.remove('recording', 'thinking');
            visualizer.classList.add('hidden');
            idleIcon.classList.remove('hidden', 'text-blue-400');
            recDot.classList.add('hidden');
            aiGlow.classList.remove('scale-150', 'bg-cyan-500/20');

            if (state === 'recording') {
                statusContainer.classList.add('recording');
                recDot.classList.remove('hidden');
                stateLabel.innerText = "Listening...";
            } else if (state === 'thinking') {
                statusContainer.classList.add('thinking');
                idleIcon.classList.add('hidden');
                visualizer.classList.remove('hidden');
                stateLabel.innerText = "Gemini is reasoning...";
                startVisualizerEffect();
            } else if (state === 'replying') {
                idleIcon.classList.add('text-blue-400');
                aiGlow.classList.add('scale-150', 'bg-cyan-500/20');
                stateLabel.innerText = "Agent Speaking";
            } else {
                stateLabel.innerText = "Tap to speak";
                updatePipelineStages('IDLE');
            }
        }

        function startVisualizerEffect() {
            bars.forEach(bar => {
                const h = Math.random() * 40 + 5;
                bar.style.height = `${h}px`;
                bar.style.opacity = (h / 45) + 0.3;
            });
            if (!visualizer.classList.contains('hidden')) setTimeout(startVisualizerEffect, 80);
        }

        async function initWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${protocol}://${location.host}/ws/voice`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => { stateLabel.innerText = "Connected & Ready"; };
            ws.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const data = JSON.parse(event.data);
                    if (data.type === 'status_update') {
                        updatePipelineStages(data.stage);
                        if (data.stage === 'LLM' || data.stage === 'TTS') setUIState('thinking');
                        if (data.stage === 'REPLYING') setUIState('replying');
                    } else if (data.type === 'user_transcript') {
                        addToHistory(data.text, 'user');
                    } else if (data.type === 'ai_response') {
                        addToHistory(data.text, 'ai');
                    }
                } else {
                    const audioBlob = new Blob([event.data], { type: 'audio/wav' });
                    const audio = new Audio(URL.createObjectURL(audioBlob));
                    audio.onended = () => {
                        setUIState('idle');
                        updatePipelineStages('IDLE');
                    };
                    audio.play();
                }
            };
        }

        async function requestMic() {
            try {
                if (audioStream) return audioStream;
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                return audioStream;
            } catch (err) {
                stateLabel.innerText = "Mic Denied";
                throw err;
            }
        }


        let recordingTimeout, recordingInterval;
        const recordingTimer = document.getElementById('recording-timer');

        micBtn.onclick = async () => {
            if (!ws || ws.readyState !== WebSocket.OPEN) await initWS();

            if (!isRecording) {
                const stream = await requestMic();
                mediaRecorder = new MediaRecorder(stream);
                let chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    if (recordingTimeout) clearTimeout(recordingTimeout);
                    if (recordingInterval) clearInterval(recordingInterval);
                    recordingTimer.classList.add('hidden');
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    blob.arrayBuffer().then(buf => ws.send(buf));
                    setUIState('thinking');
                };

                mediaRecorder.start();
                setUIState('recording');
                isRecording = true;

                // Timer UI Logic
                let timeLeft = 20;
                recordingTimer.innerText = `00:${timeLeft.toString().padStart(2, '0')}`;
                recordingTimer.classList.remove('hidden');

                recordingInterval = setInterval(() => {
                    timeLeft--;
                    recordingTimer.innerText = `00:${timeLeft.toString().padStart(2, '0')}`;
                    if (timeLeft <= 0) clearInterval(recordingInterval);
                }, 1000);

                // Auto-stop recording after 20 seconds
                recordingTimeout = setTimeout(() => {
                    if (isRecording) {
                        console.log("Auto-stopping recording after 20s timeout");
                        micBtn.click(); // Trigger the stop logic
                    }
                }, 20000);

            } else {
                if (recordingTimeout) clearTimeout(recordingTimeout);
                if (recordingInterval) clearInterval(recordingInterval);
                recordingTimer.classList.add('hidden');
                mediaRecorder.stop();
                isRecording = false;
            }
        };

        const stopBtn = document.getElementById('stop-btn');
        stopBtn.onclick = () => {
            if (isRecording) {
                if (recordingTimeout) clearTimeout(recordingTimeout);
                if (recordingInterval) clearInterval(recordingInterval);
                recordingTimer.classList.add('hidden');
                mediaRecorder.stop();
                isRecording = false;
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
            setUIState('idle');
            updatePipelineStages('IDLE');
            stateLabel.innerText = "Process Stopped.";
        };

        async function loadSavedHistory() {
            try {
                const response = await fetch('/history');
                const data = await response.json();

                if (data.length === 0) {
                    stateLabel.innerText = "No saved history found.";
                    return;
                }

                historyContainer.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    const role = item.metadata.role;
                    const timestamp = item.metadata.timestamp;
                    div.className = `bubble ${role === 'user' ? 'bubble-user' : 'bubble-ai'}`;

                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'block text-[8px] opacity-50 mb-1';
                    timeSpan.innerText = timestamp;

                    const textSpan = document.createElement('span');
                    textSpan.innerText = item.text;

                    div.appendChild(timeSpan);
                    div.appendChild(textSpan);
                    historyContainer.appendChild(div);
                });
                historyContainer.scrollTop = historyContainer.scrollHeight;
                stateLabel.innerText = "History Loaded.";
            } catch (err) {
                console.error("Error loading history:", err);
                stateLabel.innerText = "Failed to load history.";
            }
        }

        document.getElementById('load-history-btn').onclick = loadSavedHistory;
        document.getElementById('simulate-btn').onclick = async () => {
            if (!ws || ws.readyState !== WebSocket.OPEN) await initWS();
            stateLabel.innerText = "Simulating input...";
            updatePipelineStages('LLM');
            setUIState('thinking');
            // Just for UI demo
            setTimeout(() => {
                updatePipelineStages('TTS');
                setUIState('replying');
                addToHistory("Hi, I need help booking an appointment.", "user");
                addToHistory("Sure! I can help you book an appointment. Which doctor would you like to see?", "ai");
            }, 2000);
        };
    </script>
</body>

</html>
