<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Voice Agent - Gemini Powered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .recording {
            animation: pulse-red 1.5s infinite;
        }

        .thinking {
            animation: pulse-blue 1.5s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        @keyframes pulse-blue {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        .bars-container {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 30px;
        }

        .bar {
            width: 3px;
            background: #3b82f6;
            border-radius: 4px;
            transition: height 0.1s;
        }
    </style>
</head>

<body class="bg-[#0f172a] text-white min-h-screen transition-colors duration-500">
    <div class="container mx-auto max-w-lg px-4 py-12 flex flex-col items-center justify-center min-h-screen">

        <!-- Header -->
        <div class="text-center mb-12">
            <h1
                class="text-4xl font-semibold mb-3 bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">
                Gemini Clinical AI</h1>
            <p class="text-slate-400 text-sm tracking-widest uppercase">Real-Time Multilingual Agent</p>
        </div>

        <!-- Main Card -->
        <div
            class="w-full bg-[#1e293b]/50 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden">
            <div id="ai-glow"
                class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/10 blur-3xl rounded-full transition-all duration-1000">
            </div>

            <div class="flex flex-col items-center space-y-10 relative z-10">

                <!-- Visualization Area -->
                <div id="status-container"
                    class="w-32 h-32 rounded-full bg-slate-800/50 flex items-center justify-center border-2 border-white/5 transition-all duration-500">
                    <div id="visualizer" class="bars-container hidden">
                        <div class="bar h-2"></div>
                        <div class="bar h-6"></div>
                        <div class="bar h-4"></div>
                        <div class="bar h-8"></div>
                        <div class="bar h-3"></div>
                    </div>
                    <svg id="idle-icon" class="w-12 h-12 text-slate-500" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z">
                        </path>
                    </svg>
                </div>

                <!-- Response / Transcript -->
                <div class="w-full min-h-[80px] text-center">
                    <p id="transcript" class="text-xl font-light text-slate-200 leading-relaxed italic">Click the
                        microphone to start</p>
                </div>

                <!-- Controls -->
                <div class="flex flex-col items-center gap-4">
                    <button id="mic-btn"
                        class="w-20 h-20 bg-blue-600 hover:bg-blue-500 rounded-full flex items-center justify-center shadow-lg shadow-blue-900/40 transition-all hover:scale-110 active:scale-95 group">
                        <div class="relative">
                            <div id="rec-dot" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full hidden">
                            </div>
                            <svg class="w-8 h-8 text-white group-hover:drop-shadow-md" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                                <path
                                    d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                    </button>
                </div>
                </button>
                <span id="state-label" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Tap to
                    speak</span>
            </div>
        </div>
    </div>

    <!-- Footer / Stats -->
    <div id="stats"
        class="mt-8 flex gap-6 text-[10px] items-center text-slate-500 opacity-0 transition-opacity duration-1000">
        <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
            <span>LLM: <span id="llm-time">0</span>ms</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-blue-400"></div>
            <span>TOTAL: <span id="total-time">0</span>ms</span>
        </div>
    </div>
    </div>

    <script>
        let ws;
        let mediaRecorder;
        let isRecording = false;
        const micBtn = document.getElementById('mic-btn');
        const transcriptText = document.getElementById('transcript');
        const statusContainer = document.getElementById('status-container');
        const idleIcon = document.getElementById('idle-icon');
        const visualizer = document.getElementById('visualizer');
        const stateLabel = document.getElementById('state-label');
        const recDot = document.getElementById('rec-dot');
        const aiGlow = document.getElementById('ai-glow');
        const bars = document.querySelectorAll('.bar');

        function setUIState(state) {
            statusContainer.classList.remove('recording', 'thinking');
            visualizer.classList.add('hidden');
            idleIcon.classList.remove('hidden', 'text-blue-400', 'text-white');
            recDot.classList.add('hidden');
            stateLabel.innerText = "Tap to speak";

            if (state === 'recording') {
                statusContainer.classList.add('recording');
                recDot.classList.remove('hidden');
                stateLabel.innerText = "Listening...";
                stateLabel.classList.replace('text-slate-500', 'text-red-400');
            } else if (state === 'thinking') {
                statusContainer.classList.add('thinking');
                idleIcon.classList.add('hidden');
                visualizer.classList.remove('hidden');
                stateLabel.innerText = "Gemini is thinking...";
                stateLabel.classList.replace('text-red-400', 'text-blue-400');
                startVisualizerEffect();
            } else if (state === 'replying') {
                idleIcon.classList.add('text-blue-400');
                stateLabel.innerText = "Agent is speaking";
                aiGlow.classList.add('scale-150', 'opacity-30');
            } else {
                stateLabel.classList.remove('text-blue-400', 'text-red-400');
                stateLabel.classList.add('text-slate-500');
                aiGlow.classList.remove('scale-150', 'opacity-30');
            }
        }

        function startVisualizerEffect() {
            bars.forEach(bar => {
                const h = Math.random() * 20 + 5;
                bar.style.height = `${h}px`;
            });
            if (!visualizer.classList.contains('hidden')) {
                setTimeout(startVisualizerEffect, 100);
            }
        }

        async function initWS() {
            ws = new WebSocket(`ws://${location.hostname}:8000/ws/voice`);
            ws.binaryType = 'arraybuffer';

            ws.onmessage = async (event) => {
                if (typeof event.data === 'string') {
                    const data = JSON.parse(event.data);
                    transcriptText.innerText = data.text;
                    document.getElementById('llm-time').innerText = data.latency_ms.toFixed(0);
                    document.getElementById('total-time').innerText = data.latency_ms.toFixed(0);
                    document.getElementById('stats').classList.remove('opacity-0');
                    setUIState('idle');
                } else {
                    setUIState('replying');
                    const audioBlob = new Blob([event.data], { type: 'audio/wav' });
                    const audio = new Audio(URL.createObjectURL(audioBlob));
                    audio.onended = () => setUIState('idle');
                    audio.play();
                }
            };
        }

        micBtn.onclick = async () => {
            if (!isRecording) {
                if (!ws || ws.readyState !== WebSocket.OPEN) await initWS();

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                let chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    blob.arrayBuffer().then(buffer => ws.send(buffer));
                    setUIState('thinking');
                };

                mediaRecorder.start();
                setUIState('recording');
                isRecording = true;
            } else {
                mediaRecorder.stop();
                isRecording = false;
            }
        };
    </script>
</body>

</html>
